<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>University Lost & Found</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>

<header class="header">
  <nav class="navbar">
    <div class="logo-area">
      <img src="download (1).jpg" alt="Logo" class="logo">
      <span class="brand-name">HMRITM <span>Lost & Found</span></span>
    </div>
    <div class="nav-links">
      <a href="#">Home</a>
      <a href="#">Support</a>
      <a href="#">About</a>
    </div>
  </nav>
</header>

<main class="container">
  <section class="form-section">
    <h2>Report an Item</h2>
    <form id="itemForm">
      <div class="form-group">
        <label for="type">Status</label>
        <select id="type">
          <option value="Lost">Lost</option>
          <option value="Found">Found</option>
        </select>
      </div>

      <div class="form-group">
        <input type="text" id="name" placeholder="What did you lose/find?" required>
      </div>

      <textarea id="description" placeholder="Provide some details (color, brand, etc.)" rows="3"></textarea>
      
      <div class="form-row">
        <input type="text" id="location" placeholder="Last seen location">
        <input type="text" id="contact" placeholder="Email or Phone" required>
      </div>

      <button type="submit" class="btn-submit">Submit</button>
    </form>
  </section>

  <section class="list-section">
    <h2>Recent Item Listings</h2>
    <div id="itemsList" class="grid-container"></div>
  </section>
</main>

<script src="main.js"></script>
</body>
</html>
